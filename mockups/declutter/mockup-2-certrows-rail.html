<!DOCTYPE html>
<!--
  DECLUTTER MOCKUP 2 — left-edge accent rail on active cert rows (image 2)
  Tell: landing/analytics.html  ->  .cca-pr-row-active::before  (a 3px bronze bar,
  left:0, top/bottom:14px). The taste skill bans decorative edge lines; this is the
  documented #1 anti-slop rail. Faithful copy of the v3 scoped CSS + real row markup.
  Source: landing/analytics.html + lib/cross-cert-analytics.js  (light theme)
-->
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Declutter · Cert rows · Left rail</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.975 0.007 85);--surface:oklch(0.992 0.004 85);--surface-2:oklch(0.965 0.010 84);
    --ink:oklch(0.22 0.015 280);--ink-soft:oklch(0.36 0.014 280);--muted:oklch(0.50 0.013 280);
    --border:oklch(0.86 0.008 85);--border-soft:oklch(0.91 0.006 85);
    --accent:oklch(0.50 0.155 55);--accent-bright:oklch(0.80 0.155 64);--accent-deep:oklch(0.42 0.150 52);--on-accent:oklch(0.985 0.010 85);
    --pass:oklch(0.52 0.13 150);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--eo:cubic-bezier(0.23,1,0.32,1);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink);padding:48px clamp(20px,5vw,72px)}
  .lab-h{max-width:1000px;margin:0 auto}
  .lab-h h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:26px;letter-spacing:-.01em;margin:0}
  .lab-h p{font-size:14px;color:var(--muted);margin:6px 0 0;max-width:70ch;line-height:1.55}
  .deck{max-width:1000px;margin:30px auto 0;display:grid;gap:14px}
  .opt-label{display:flex;align-items:baseline;gap:12px;margin:26px 0 4px}
  .opt-label .tag{font:700 11px/1 'Inter';letter-spacing:.12em;text-transform:uppercase;color:var(--accent-deep);background:color-mix(in oklab,var(--accent) 12%,transparent);border:1px solid color-mix(in oklab,var(--accent) 28%,transparent);padding:6px 11px;border-radius:999px}
  .opt-label .tag.cur{color:var(--muted);background:none;border-color:var(--border)}
  .opt-label .tag.rec{color:var(--on-accent);background:var(--accent);border-color:var(--accent-deep)}
  .opt-label h2{font:650 16px/1 'Inter';margin:0}
  .opt-label .note{font-size:13px;color:var(--muted);line-height:1.5}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 22px;box-shadow:0 1px 0 rgba(255,255,255,.55),0 18px 38px -18px oklch(0.22 0.015 280 / .14)}

  /* ── faithful cross-cert roster CSS, scoped to .ap ───────────────────── */
  .ap .cca-pr-row{display:grid;grid-template-columns:58px minmax(0,1.35fr) minmax(0,1.55fr) auto;align-items:center;gap:20px;padding:22px 6px;border-bottom:1px solid var(--border-soft);position:relative}
  .ap .cca-pr-row:last-child{border-bottom:0}
  .ap .cca-pr-row-active{background:linear-gradient(90deg,color-mix(in oklab,var(--accent) 5%,transparent),transparent 62%);border-radius:14px;margin:2px -10px;padding:22px 16px;border-bottom:0}
  .ap .cca-pr-row-active::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:99px;background:var(--accent)}
  .ap .cca-pr-glyph{width:50px;height:50px;border-radius:14px;flex:none;display:grid;place-items:center;font:800 14px var(--mono);letter-spacing:.02em;color:var(--accent-deep);background:color-mix(in oklab,var(--accent) 9%,transparent);border:1px solid color-mix(in oklab,var(--accent) 22%,transparent)}
  .ap .cca-pr-glyph .cg{display:inline-flex;align-items:baseline;white-space:nowrap}
  .ap .cca-pr-glyph .cg-ac{color:var(--accent)}
  .ap .cca-pr-glyph .cg-sup{font-size:.55em;vertical-align:super;font-weight:800;align-self:flex-start;margin-left:.5px}
  .ap .cca-pr-info{min-width:0}
  .ap .cca-pr-name{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:var(--ink);flex-wrap:wrap;margin-bottom:5px;letter-spacing:-.01em}
  .ap .cca-pr-coach{font-size:12.5px;color:var(--muted);line-height:1.5}
  .ap .cca-pr-status-pill{font-size:9.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:6px;color:var(--accent-deep);border:1px solid color-mix(in oklab,var(--accent) 42%,transparent);background:color-mix(in oklab,var(--accent) 12%,transparent)}
  .ap .cca-pr-readiness{min-width:0}
  .ap .cca-pr-readiness-label{display:flex;align-items:baseline;justify-content:space-between;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:13px;text-transform:uppercase;letter-spacing:.06em}
  .ap .cca-pr-readiness-score{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;color:var(--muted);letter-spacing:-.01em}
  .ap .cca-pr-readiness-bar{position:relative;height:8px;border-radius:99px;background:repeating-linear-gradient(90deg,color-mix(in oklab,var(--muted) 16%,transparent) 0 6px,transparent 6px 12px);overflow:visible}
  .ap .cca-pr-readiness-cutoff{position:absolute;top:-4px;width:2px;height:16px;background:var(--ink-soft);border-radius:1px}
  .ap .cca-pr-readiness-cutoff::after{content:"";position:absolute;top:-5px;left:-2px;width:6px;height:6px;border-radius:50%;background:var(--ink-soft)}
  .ap .cca-pr-readiness-meta{margin-top:9px;font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;gap:10px}
  .ap .cca-pr-readiness-meta span:last-child{font-weight:650;color:var(--accent-deep)}
  .ap .cca-pr-action-btn{font-size:12.5px;font-weight:650;color:var(--on-accent);background:var(--accent);border:1px solid var(--accent-deep);padding:9px 17px;border-radius:10px;text-decoration:none;white-space:nowrap}
  .ap .cca-pr-action-ghost{color:var(--accent);background:none;border:1px solid color-mix(in oklab,var(--accent) 32%,transparent)}

  /* ── OPTION A · de-carded ledger (recommended): no rail, no card, hairline only ── */
  .optA .cca-pr-row-active{background:none;border-radius:0;margin:0;padding:22px 6px;border-bottom:1px solid var(--border-soft)}
  .optA .cca-pr-row-active:last-child{border-bottom:0}
  .optA .cca-pr-row-active::before{display:none}

  /* ── OPTION B · soft wash, no rail: keep highlight, kill the bar ── */
  .optB .cca-pr-row-active::before{display:none}

  /* ── OPTION C · glyph-led: de-card + filled bronze lettermark carries "active" ── */
  .optC .cca-pr-row-active{background:none;border-radius:0;margin:0;padding:22px 6px;border-bottom:1px solid var(--border-soft)}
  .optC .cca-pr-row-active:last-child{border-bottom:0}
  .optC .cca-pr-row-active::before{display:none}
  .optC .cca-pr-row-active .cca-pr-glyph{background:var(--accent);color:var(--on-accent);border-color:var(--accent-deep)}
</style>
</head>
<body>
  <div class="lab-h">
    <h1>Declutter 2 — the left-edge rail on active cert rows</h1>
    <p>Each active row paints a 3px bronze bar down its left edge. It is pure decoration — the lettermark tile
       and the <strong>Active</strong> pill already carry that state. Below: the current rail, then three rail-free ways
       to keep “active” legible.</p>
  </div>

  <div class="deck">
    <!-- placeholder; rosters injected by script for brevity -->
  </div>

<script>
  // glyph = full lettermark; sup = optional superscript (A+ Core 1/2). Mirrors
  // certGlyphHTML(): head = all-but-last char, last char gets the bronze .cg-ac accent.
  const CERTS = [
    {glyph:'S+',sup:'',name:'Security+',desc:'Builds on N+. 65% knowledge transfer from Network+.',cut:750,cta:'Resume'},
    {glyph:'A+',sup:'1',name:'CompTIA A+ Core 1',desc:'First half of CompTIA A+. Hardware, networking, and mobile devices.',cut:675,cta:'Open'},
    {glyph:'A+',sup:'2',name:'CompTIA A+ Core 2',desc:'Second half of CompTIA A+. OS, security, and operational procedures.',cut:700,cta:'Open'},
    {glyph:'AI',sup:'',name:'Microsoft Azure AI Fundamentals',desc:'AI and ML fundamentals on Azure. Builds on AZ-900 cloud concepts.',cut:700,cta:'Open'},
    {glyph:'SC',sup:'',name:'Microsoft SC-900',desc:'Security, compliance, and identity fundamentals. 35% transfer from Sec+.',cut:700,cta:'Open'},
  ];
  function glyphHTML(c){
    const head=c.glyph.slice(0,-1), last=c.glyph.slice(-1);
    return `<span class="cg">${head}<span class="cg-ac">${last}</span>${c.sup?`<span class="cg-sup">${c.sup}</span>`:''}</span>`;
  }
  function rosterHTML(){
    return CERTS.map((c,i)=>`
      <div class="cca-pr-row cca-pr-row-active">
        <div class="cca-pr-glyph">${glyphHTML(c)}</div>
        <div class="cca-pr-info">
          <div class="cca-pr-name">${c.name} <span class="cca-pr-status-pill">Active</span></div>
          <div class="cca-pr-coach">${c.desc}</div>
        </div>
        <div class="cca-pr-readiness">
          <div class="cca-pr-readiness-label"><span>Readiness</span><span class="cca-pr-readiness-score">—</span></div>
          <div class="cca-pr-readiness-bar"><div class="cca-pr-readiness-cutoff" style="left:70%"></div></div>
          <div class="cca-pr-readiness-meta"><span>Open cert app to compute</span><span>Cutoff ${c.cut}</span></div>
        </div>
        <div class="cca-pr-action"><a class="cca-pr-action-btn${c.cta==='Open'?' cca-pr-action-ghost':''}" href="#">${c.cta} →</a></div>
      </div>`).join('');
  }
  const VARIANTS = [
    {cls:'',          tag:'Current', tagcls:'cur', h:'3px bronze rail on every active row', note:'The line you flagged.'},
    {cls:'optA',      tag:'Option A · recommended', tagcls:'rec', h:'De-carded ledger — no rail, no card', note:'Hairline rows; the Active pill carries state. Matches the production de-card direction.'},
    {cls:'optB',      tag:'Option B', tagcls:'', h:'Soft wash, no rail', note:'Keeps the gentle highlight on active rows; just drops the hard bar.'},
    {cls:'optC',      tag:'Option C', tagcls:'', h:'Glyph-led — filled bronze lettermark', note:'De-carded rows; the solid lettermark tile signals “active” at a glance.'},
  ];
  document.querySelector('.deck').innerHTML = VARIANTS.map(v=>`
    <div class="opt-label">
      <span class="tag ${v.tagcls}">${v.tag}</span>
      <h2>${v.h}</h2><span class="note">${v.note}</span>
    </div>
    <div class="panel ap ${v.cls}">${rosterHTML()}</div>
  `).join('');
</script>
</body>
</html>
