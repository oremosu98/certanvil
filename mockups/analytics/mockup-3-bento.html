<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics · Bento Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root, [data-theme="dark"] {
  --ease-out: cubic-bezier(0.23,1,0.32,1); --ease-in-out: cubic-bezier(0.77,0,0.175,1);
  --bg: oklch(0.17 0.012 60); --surface: oklch(0.21 0.014 60); --surface2: oklch(0.25 0.016 60);
  --surface3: oklch(0.30 0.018 60); --text: oklch(0.93 0.010 75); --text-dim: oklch(0.72 0.012 70);
  --text-faint: oklch(0.56 0.012 70); --accent: oklch(0.80 0.155 64); --accent-2: oklch(0.86 0.10 75);
  --accent-soft: oklch(0.80 0.155 64 / 0.16); --green: oklch(0.74 0.150 152); --green-soft: oklch(0.74 0.15 152 / 0.16);
  --yellow: oklch(0.82 0.13 85); --red: oklch(0.68 0.17 25); --border: oklch(0.32 0.016 60); --hairline: oklch(0.29 0.016 60);
  --sky-top: oklch(0.21 0.024 285); --sky-bot: oklch(0.15 0.020 60);
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.32), 0 3px 10px oklch(0 0 0 / 0.26);
  --shadow-lg: 0 14px 40px oklch(0 0 0 / 0.46), 0 3px 8px oklch(0 0 0 / 0.3);
  /* domain hues: bronze-family palette tuned for dark */
  --d1: oklch(0.80 0.150 64); --d2: oklch(0.74 0.150 152); --d3: oklch(0.80 0.12 230);
  --d4: oklch(0.70 0.17 30); --d5: oklch(0.82 0.13 95);
}
[data-theme="light"] {
  --bg: oklch(0.965 0.008 75); --surface: oklch(0.99 0.005 75); --surface2: oklch(0.945 0.010 72);
  --surface3: oklch(0.91 0.012 68); --text: oklch(0.27 0.020 55); --text-dim: oklch(0.46 0.020 58);
  --text-faint: oklch(0.60 0.016 60); --accent: oklch(0.50 0.155 55); --accent-2: oklch(0.46 0.13 50);
  --accent-soft: oklch(0.50 0.155 55 / 0.12); --green: oklch(0.52 0.13 150); --green-soft: oklch(0.52 0.13 150 / 0.12);
  --yellow: oklch(0.66 0.13 80); --red: oklch(0.55 0.20 25); --border: oklch(0.87 0.012 68); --hairline: oklch(0.84 0.012 68);
  --sky-top: oklch(0.30 0.035 270); --sky-bot: oklch(0.22 0.030 285);
  --shadow-sm: 0 1px 2px oklch(0.30 0.02 60 / 0.06), 0 2px 8px oklch(0.30 0.02 60 / 0.05);
  --shadow-lg: 0 10px 34px oklch(0.30 0.02 60 / 0.14), 0 2px 6px oklch(0.30 0.02 60 / 0.07);
  --d1: oklch(0.55 0.150 55); --d2: oklch(0.50 0.13 150); --d3: oklch(0.52 0.13 245);
  --d4: oklch(0.55 0.19 28); --d5: oklch(0.62 0.13 80);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text)}
html{transition:background .4s ease,color .4s ease}
body{
  font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  line-height:1.5;min-height:100vh;padding:clamp(20px,4vw,48px) clamp(16px,4vw,40px) 88px;
}
.wrap{max-width:1200px;margin:0 auto}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}

/* ---------- Header ---------- */
.page-head{margin-bottom:26px}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--accent);margin-bottom:10px;
}
h1{
  font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(30px,5vw,46px);
  letter-spacing:-0.015em;line-height:1.03;color:var(--text);
}
.page-sub{color:var(--text-dim);font-size:15px;margin-top:10px;max-width:64ch}
.page-sub b{color:var(--text);font-weight:600}

/* ---------- Bento grid ---------- */
.bento{
  display:grid;grid-template-columns:repeat(12,1fr);
  grid-auto-rows:minmax(96px,auto);gap:14px;grid-auto-flow:dense;
}
.tile{
  background:var(--surface);border:1px solid var(--hairline);border-radius:20px;
  padding:22px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
  transition:transform .26s var(--ease-out),box-shadow .26s var(--ease-out),border-color .2s,background .4s ease;
  display:flex;flex-direction:column;
}
@media (hover: hover) and (pointer: fine){
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--border)}
}
.tile-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
}
.tile-eyebrow .count{color:var(--text-faint);font-weight:400}
.tile h2{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-0.01em;color:var(--text)}

/* ----- spans ----- */
.s-read{grid-column:span 5;grid-row:span 3}
.s-const{grid-column:span 7;grid-row:span 3}
.s-trend{grid-column:span 7;grid-row:span 3}
.s-why{grid-column:span 5;grid-row:span 3}
.s-domains{grid-column:span 5;grid-row:span 4}
.s-streak{grid-column:span 4;grid-row:span 2}
.s-diff{grid-column:span 3;grid-row:span 2}
.s-evq{grid-column:span 4;grid-row:span 2}
.s-heat{grid-column:span 7;grid-row:span 2}
.s-wrong{grid-column:span 5;grid-row:span 3}
.s-miles{grid-column:span 4;grid-row:span 3}
.s-exam{grid-column:span 3;grid-row:span 3}

/* ============================================================
   READINESS (featured, tinted)
   ============================================================ */
.s-read{
  background:
    radial-gradient(130% 120% at 100% 0%, var(--accent-soft), transparent 58%),
    linear-gradient(158deg, var(--surface2), var(--surface));
  justify-content:space-between;
}
.read-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.read-tier{
  display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--accent);
  border-radius:999px;padding:4px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;
  font-weight:500;letter-spacing:0.06em;
}
.read-score{display:flex;align-items:baseline;gap:10px;margin:16px 0 4px}
.read-score .big{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(54px,8vw,78px);line-height:0.9;letter-spacing:-0.02em;color:var(--text)}
.read-score .of{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--text-faint)}
.read-cap{font-size:14px;color:var(--text-dim);max-width:38ch}
.read-cap b{color:var(--text);font-weight:600}
.read-bar-wrap{margin-top:18px}
.read-bar{position:relative;height:12px;background:var(--surface3);border-radius:8px;overflow:visible}
.read-bar i{display:block;height:100%;border-radius:8px;width:0;
  background:linear-gradient(90deg,var(--accent-2),var(--accent));
  transition:width .95s var(--ease-out)}
.read-tick{position:absolute;top:-6px;bottom:-6px;width:2px;background:var(--green);border-radius:2px}
.read-tick::after{content:'PASS 720';position:absolute;top:-17px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--green);white-space:nowrap}
.read-fore{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-top:22px;font-size:13px;color:var(--text-dim)}
.read-fore .fv{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:500}
.read-fore .fg{color:var(--green)}
.read-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;
  border-top:1px solid var(--hairline);padding-top:18px}
.rstat{display:flex;flex-direction:column;gap:3px}
.rstat .n{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500;color:var(--text);line-height:1}
.rstat .l{font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint)}
.rstat svg{width:100%;height:18px;margin-top:2px;overflow:visible}
.rstat svg path{fill:none;stroke:var(--accent);stroke-width:1.6;opacity:.85}

/* ============================================================
   CONSTELLATION (sky tile)
   ============================================================ */
.s-const{
  background:linear-gradient(180deg, var(--sky-top), var(--sky-bot));
  border-color:oklch(0.36 0.02 270 / 0.5);
}
.s-const .tile-eyebrow{color:oklch(0.78 0.04 270)}
.s-const h2{color:oklch(0.95 0.02 280)}
.const-sub{font-size:12.5px;color:oklch(0.74 0.03 270);margin-top:3px}
.const-mount{position:relative;flex:1;margin-top:12px;min-height:0}
.const-mount svg{display:block;width:100%;height:100%}
.const-grid line{stroke:oklch(0.6 0.04 270 / 0.07);stroke-width:1}
.const-tether{stroke:oklch(0.6 0.04 270 / 0.10);stroke-width:1}
.const-cluster-label .kicker{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:0.16em;
  fill:oklch(0.66 0.03 270);text-transform:uppercase}
.const-cluster-label .name{font-family:'Fraunces',serif;font-size:12px;font-weight:600;fill:oklch(0.9 0.02 280)}
.const-node{cursor:pointer;outline:none}
.const-node .const-halo{opacity:.26}
.const-node[data-domain="1"] .const-halo,.const-node[data-domain="1"] .const-core{fill:var(--d1)}
.const-node[data-domain="2"] .const-halo,.const-node[data-domain="2"] .const-core{fill:var(--d2)}
.const-node[data-domain="3"] .const-halo,.const-node[data-domain="3"] .const-core{fill:var(--d3)}
.const-node[data-domain="4"] .const-halo,.const-node[data-domain="4"] .const-core{fill:var(--d4)}
.const-node[data-domain="5"] .const-halo,.const-node[data-domain="5"] .const-core{fill:var(--d5)}
.const-node[data-tier="novice"] .const-core{opacity:.34}
.const-node[data-tier="developing"] .const-core{opacity:.58}
.const-node[data-tier="proficient"] .const-core{opacity:.82}
.const-node[data-tier="mastered"] .const-core{opacity:1}
.const-node[data-tier="unstudied"] .const-halo{opacity:.10}
.const-node[data-tier="unstudied"] .const-core{opacity:.18}
.const-node:focus-visible .const-halo{stroke:var(--accent);stroke-width:1.5;opacity:.7}
.const-tt{position:absolute;pointer-events:none;background:oklch(0.14 0.012 60 / 0.97);color:oklch(0.95 0.01 80);
  border:1px solid oklch(0.4 0.02 270 / 0.6);border-radius:9px;padding:8px 11px;font-size:12px;line-height:1.5;
  opacity:0;transform:translateY(4px);transition:opacity .14s ease,transform .14s ease;z-index:10;white-space:nowrap;
  box-shadow:0 8px 24px -8px oklch(0 0 0 / 0.6)}
.const-tt.show{opacity:1;transform:translateY(0)}
.const-tt b{font-weight:600;font-family:'Fraunces',serif}
.const-tt .tt-meta{display:block;color:oklch(0.7 0.02 80);font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:2px}
.const-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:oklch(0.7 0.03 270);letter-spacing:0.04em}
.const-legend span{display:inline-flex;align-items:center;gap:6px}
.const-legend i{width:8px;height:8px;border-radius:50%;background:oklch(0.85 0.02 270)}
.const-legend i.t2{opacity:.7}.const-legend i.t3{opacity:.45}.const-legend i.t4{opacity:.22}

/* ============================================================
   PASS-TREND chart
   ============================================================ */
.s-trend .trend-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.trend-title h2{margin-bottom:2px}
.trend-title h2 em{font-style:italic;color:var(--accent);font-weight:600}
.trend-verdict{font-size:12.5px;color:var(--text-dim);margin-top:3px}
.trend-verdict b{color:var(--green);font-weight:600}
.acc-tabs{display:flex;gap:3px;padding:3px;background:var(--surface2);border:1px solid var(--hairline);border-radius:10px}
.acc-tab{padding:6px 13px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);background:transparent;border:none;
  border-radius:7px;cursor:pointer;transition:color .15s,background .15s,transform .14s var(--ease-out)}
@media (hover: hover) and (pointer: fine){.acc-tab:hover{color:var(--text)}}
.acc-tab:active{transform:scale(.98)}
.acc-tab[aria-pressed="true"]{background:var(--accent);color:oklch(0.18 0.02 60)}
.acc-wrap{flex:1;min-height:0;margin-top:14px;position:relative}
.acc-svg{width:100%;height:100%;display:block;overflow:visible}
.acc-grid line{stroke:var(--hairline);stroke-width:1;stroke-dasharray:4 4;opacity:.7}
.acc-grid text{font-family:'JetBrains Mono',monospace;font-size:10px;fill:var(--text-faint)}
.acc-pass-line{stroke:var(--green);stroke-width:1.5;stroke-dasharray:6 4;opacity:.9}
.acc-pass-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;fill:var(--green);letter-spacing:.06em}
.acc-area{fill:var(--accent);opacity:.1}
.acc-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}
.acc-dot{fill:var(--surface);stroke:var(--accent);stroke-width:2}
.acc-xlabel{font-family:'JetBrains Mono',monospace;font-size:10px;fill:var(--text-faint)}

/* ============================================================
   WHY-SCORE
   ============================================================ */
.s-why{background:linear-gradient(160deg,var(--surface),var(--surface2));justify-content:space-between}
.why-lev{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:4px}
.why-lev .v{font-family:'Fraunces',serif;font-weight:600;font-size:34px;color:var(--green);letter-spacing:-0.01em;line-height:1}
.why-lev .l{font-size:12px;color:var(--text-dim)}
.why-head{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-0.01em;color:var(--text);margin:6px 0 8px}
.why-body{font-size:14px;color:var(--text-dim);line-height:1.55}
.why-factors{display:flex;flex-direction:column;gap:9px;margin-top:18px;border-top:1px solid var(--hairline);padding-top:16px}
.why-f{display:grid;grid-template-columns:auto 1fr;gap:11px;align-items:start;font-size:13px}
.why-f .ar{font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.3;font-weight:600}
.why-f .ar.up{color:var(--green)}.why-f .ar.down{color:var(--red)}
.why-f .ft{color:var(--text)}
.why-f .fn{display:block;color:var(--text-faint);font-size:12px;margin-top:1px}

/* ============================================================
   DOMAINS
   ============================================================ */
.dom-list{display:flex;flex-direction:column;gap:4px;flex:1;justify-content:center}
.dom-row{display:grid;grid-template-columns:1fr auto;gap:5px 12px;align-items:center;
  padding:10px 8px;border-radius:11px;transition:background .15s}
.dom-row:hover{background:var(--accent-soft)}
.dom-row .dl{display:flex;align-items:center;gap:9px;min-width:0;font-size:13.5px;font-weight:500;color:var(--text)}
.dom-row .obj{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);
  background:var(--surface2);border:1px solid var(--hairline);border-radius:5px;padding:1px 5px;flex:0 0 auto}
.dom-row .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dom-row .dm{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--text);text-align:right}
.dom-bar{grid-column:1 / -1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.dom-bar i{display:block;height:100%;border-radius:3px;width:0;transition:width .85s var(--ease-out)}
.dom-bar i[data-d="1"]{background:var(--d1)}.dom-bar i[data-d="2"]{background:var(--d2)}
.dom-bar i[data-d="3"]{background:var(--d3)}.dom-bar i[data-d="4"]{background:var(--d4)}
.dom-bar i[data-d="5"]{background:var(--d5)}
.dom-meta{grid-column:1 / -1;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);margin-top:1px}
.dom-meta .flag{color:var(--red)}

/* ============================================================
   STREAK
   ============================================================ */
.s-streak{background:linear-gradient(160deg,var(--surface),var(--accent-soft))}
.streak-main{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.streak-main .v{font-family:'Fraunces',serif;font-weight:600;font-size:40px;color:var(--accent);line-height:0.9}
.streak-main .l{font-size:13px;color:var(--text-dim)}
.streak-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint)}
.week-dots{display:flex;gap:7px;margin-top:14px}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.wd .dot{width:100%;max-width:30px;aspect-ratio:1;border-radius:8px;background:var(--surface3);border:1px solid var(--hairline)}
.wd.on .dot{background:var(--accent);border-color:transparent}
.wd.today .dot{box-shadow:0 0 0 2px var(--accent-soft),0 0 0 3px var(--accent)}
.wd .wl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-faint)}

/* ============================================================
   DIFFICULTY
   ============================================================ */
.diff-list{display:flex;flex-direction:column;gap:13px;flex:1;justify-content:center}
.diff-row{display:flex;flex-direction:column;gap:5px}
.diff-top{display:flex;align-items:baseline;justify-content:space-between;font-size:12.5px}
.diff-top .dk{color:var(--text);font-weight:500}
.diff-top .dv{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:500}
.diff-top .dc{font-family:'JetBrains Mono',monospace;color:var(--text-faint);font-size:10px}
.diff-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.diff-bar i{display:block;height:100%;border-radius:3px;width:0;transition:width .85s var(--ease-out)}
.diff-bar i.e{background:var(--green)}.diff-bar i.m{background:var(--accent)}.diff-bar i.h{background:var(--red)}

/* ============================================================
   EXAM VS QUIZ
   ============================================================ */
.s-evq{background:linear-gradient(160deg,var(--surface),var(--surface2))}
.evq-nums{display:flex;gap:22px;margin:4px 0 10px}
.evq-cell .n{font-family:'Fraunces',serif;font-weight:600;font-size:30px;color:var(--text);line-height:0.95}
.evq-cell .n.lo{color:var(--accent)}
.evq-cell .t{font-size:10.5px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-faint);margin-top:3px}
.evq-cell .s{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);margin-top:1px}
.evq-note{font-size:12.5px;color:var(--text-dim);line-height:1.5}

/* ============================================================
   HEATMAP
   ============================================================ */
.heat-wrap{flex:1;display:flex;align-items:center;overflow:hidden;margin-top:6px}
.heat-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;grid-auto-columns:1fr;
  gap:3px;width:100%;height:100%;min-height:84px}
.heat-cell{border-radius:2.5px;background:var(--surface3)}
.heat-cell.l1{background:var(--green-soft)}
.heat-cell.l2{background:oklch(0.74 0.15 152 / 0.4)}
.heat-cell.l3{background:oklch(0.74 0.15 152 / 0.7)}
.heat-cell.l4{background:var(--green)}
[data-theme="light"] .heat-cell.l2{background:oklch(0.52 0.13 150 / 0.4)}
[data-theme="light"] .heat-cell.l3{background:oklch(0.52 0.13 150 / 0.7)}
.heat-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint)}
.heat-scale{display:flex;align-items:center;gap:4px}
.heat-scale i{width:9px;height:9px;border-radius:2px}

/* ============================================================
   WRONG PATTERNS
   ============================================================ */
.wrong-list{display:flex;flex-direction:column;gap:3px;flex:1;justify-content:center}
.wrong-row{display:grid;grid-template-columns:auto 1fr auto;gap:13px;align-items:center;
  padding:11px 8px;border-radius:11px;transition:background .15s}
.wrong-row:hover{background:var(--accent-soft)}
.wrong-rank{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;color:var(--red);
  background:oklch(0.68 0.17 25 / 0.14);border-radius:8px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.wrong-mid{min-width:0}
.wrong-mid .n{font-size:13.5px;font-weight:500;color:var(--text)}
.wrong-mid .d{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint)}
.wrong-cnt{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);text-align:right;flex:0 0 auto}
.wrong-cnt b{font-size:17px;color:var(--text);font-weight:500;display:block}

/* ============================================================
   MILESTONES
   ============================================================ */
.s-miles .mile-count{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text)}
.mile-prog{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:4px 0 16px}
.mile-prog i{display:block;height:100%;border-radius:3px;width:0;background:linear-gradient(90deg,var(--accent-2),var(--accent));
  transition:width .9s var(--ease-out)}
.mile-list{display:flex;flex-direction:column;gap:10px;flex:1}
.mile-row{display:grid;grid-template-columns:auto 1fr;gap:11px;align-items:center}
.mile-ic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  background:var(--accent-soft);color:var(--accent)}
.mile-ic svg{width:18px;height:18px}
.mile-ic.lock{background:var(--surface2);color:var(--text-faint)}
.mile-txt{min-width:0}
.mile-txt .n{font-size:13.5px;font-weight:500;color:var(--text)}
.mile-txt .d{font-size:11.5px;color:var(--text-faint)}
.mile-txt .lk{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim)}

/* ============================================================
   EXAM HISTORY
   ============================================================ */
.exam-list{display:flex;flex-direction:column;gap:2px;flex:1;justify-content:center}
.exam-row{display:grid;grid-template-columns:1fr auto;gap:4px 10px;align-items:center;
  padding:8px;border-radius:10px;transition:background .15s}
.exam-row:hover{background:var(--accent-soft)}
.exam-row .el{font-size:12.5px;font-weight:500;color:var(--text)}
.exam-row .ed{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint)}
.exam-row .es{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--text);text-align:right}
.exam-row .es.pass{color:var(--green)}
.exam-bar{grid-column:1 / -1;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.exam-bar i{display:block;height:100%;border-radius:2px;width:0;background:var(--accent);transition:width .8s var(--ease-out)}
.exam-bar i.pass{background:var(--green)}

/* ---------- Theme toggle ---------- */
.theme-toggle{position:fixed;top:18px;right:18px;z-index:50;width:42px;height:42px;border-radius:12px;
  border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;justify-content:center;transition:transform .18s var(--ease-out),background .18s}
@media (hover: hover) and (pointer: fine){.theme-toggle:hover{transform:translateY(-2px)}}
.theme-toggle:active{transform:scale(.94);transition:transform .14s var(--ease-out)}
.theme-toggle svg{width:19px;height:19px}
.theme-toggle .moon{display:none}
[data-theme="dark"] .theme-toggle .sun{display:none}
[data-theme="dark"] .theme-toggle .moon{display:block}

/* ---------- Entrance ---------- */
@media (prefers-reduced-motion: no-preference){
  /* Tiles land with a spring settle: opacity + translateY + scale(0.97)→1, tiny overshoot.
     Driven by a keyframe so the settle has a satisfying click rather than a linear ease. */
  .tile{opacity:0;transform:translateY(10px) scale(.97);will-change:transform,opacity}
  .tile.in{
    animation:tileSettle .56s var(--ease-out) calc(var(--index,0)*52ms) both;
  }
  @keyframes tileSettle{
    0%{opacity:0;transform:translateY(10px) scale(.97)}
    70%{opacity:1;transform:translateY(-2px) scale(1.006)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  /* Constellation stars ignite (staggered scale-in) when the const tile lands.
     The ignite is triggered by .lit on the tile, so it fires in sync with the settle. */
  .const-node{transform-box:fill-box;transform-origin:center}
  .s-const:not(.lit) .const-node{opacity:0;transform:scale(.4)}
  .s-const.lit .const-node{animation:starIgnite .5s var(--ease-out) backwards;animation-delay:var(--ig,0s)}
  @keyframes starIgnite{
    0%{opacity:0;transform:scale(.4)}
    65%{opacity:1;transform:scale(1.12)}
    100%{opacity:1;transform:scale(1)}
  }
  .const-core.twinkle{animation:twinkle var(--tw,4s) ease-in-out infinite var(--td,0s)}
  @keyframes twinkle{0%,100%{opacity:var(--base)}50%{opacity:calc(var(--base) * 0.5)}}
  .const-pulsar .const-halo{animation:pulsar 3.4s ease-out infinite}
  @keyframes pulsar{0%{opacity:.26;r:var(--r0)}55%{opacity:0}100%{opacity:0;r:calc(var(--r0) * 1.9)}}
  .acc-line{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset 1s var(--ease-out)}
  .acc-line.drawn{stroke-dashoffset:0}
  .acc-area{opacity:0;transition:opacity .5s var(--ease-out) .55s}
  .acc-dot{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.4);
    transition:opacity .32s var(--ease-out),transform .42s var(--ease-out)}
  .acc-area.drawn{opacity:.1}
  .acc-dot.drawn{opacity:1;transform:scale(1)}
}
@media (prefers-reduced-motion: reduce){
  .tile{opacity:0}
  .tile.in{opacity:1;transition:opacity .3s linear}
  .acc-area{opacity:.1}.acc-dot{opacity:1}
}

/* ---------- Responsive ---------- */
@media (max-width:980px){
  .bento{grid-template-columns:repeat(6,1fr)}
  .s-read{grid-column:span 6;grid-row:span 3}
  .s-trend,.s-const{grid-column:span 6;grid-row:span 3}
  .s-why{grid-column:span 6;grid-row:span 3}
  .s-domains{grid-column:span 6;grid-row:span 4}
  .s-streak{grid-column:span 6;grid-row:span 2}
  .s-diff{grid-column:span 3;grid-row:span 2}
  .s-evq{grid-column:span 3;grid-row:span 2}
  .s-heat{grid-column:span 6;grid-row:span 2}
  .s-wrong{grid-column:span 6;grid-row:span 3}
  .s-miles{grid-column:span 3;grid-row:span 3}
  .s-exam{grid-column:span 3;grid-row:span 3}
}
@media (max-width:768px){
  .bento{grid-template-columns:1fr}
  .tile{grid-column:span 1 !important;grid-row:auto !important}
  .read-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeBtn" aria-label="Toggle dark and light theme">
  <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
</button>

<div class="wrap">
  <header class="page-head">
    <div class="eyebrow">Network+ N10-009 · Analytics</div>
    <h1>Where you stand</h1>
    <p class="page-sub">Predicted <b class="mono" id="hScore">688</b> of 900, <b class="mono" id="hGap">32</b> short of the 720 pass mark with <b class="mono">24</b> days to go. You are trending up, and one move closes most of the gap.</p>
  </header>

  <div class="bento" id="bento"></div>
</div>

<script src="./_sample-data.js"></script>
<script>
(function(){
  "use strict";
  const D = window.ANALYTICS_SAMPLE;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const bento = document.getElementById('bento');
  const SVGNS = 'http://www.w3.org/2000/svg';
  const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function svgEl(tag, attrs){ const e=document.createElementNS(SVGNS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }

  /* ---------- count-up ---------- */
  function countUp(el, target, suffix){
    suffix = suffix||'';
    if(reduce){ el.textContent = target + suffix; return; }
    const dur=820, t0=performance.now();
    (function step(now){
      const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
      el.textContent = Math.round(target*e) + suffix;
      if(p<1){ requestAnimationFrame(step); }
      else { el.textContent = target + suffix; } // bounded: settle exactly on target, stop
    })(performance.now());
  }

  /* ---------- sparkline path ---------- */
  function sparkPath(vals, w, h){
    const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
    return vals.map((v,i)=>{
      const x=(i/(vals.length-1))*w;
      const y=h-((v-min)/rng)*h;
      return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
    }).join(' ');
  }

  /* ============================================================
     READINESS tile
     ============================================================ */
  function readinessTile(){
    const r=D.readiness, s=r.stats, sp=r.spark;
    const el=document.createElement('div');
    el.className='tile s-read';
    const sparkSvg=(key)=>`<svg viewBox="0 0 60 18" preserveAspectRatio="none"><path d="${sparkPath(sp[key],60,18)}"/></svg>`;
    el.innerHTML=`
      <div>
        <div class="read-top">
          <div class="tile-eyebrow" style="margin:0">Readiness</div>
          <span class="read-tier">${esc(r.tier)}</span>
        </div>
        <div class="read-score"><span class="big mono" data-cnt="${r.predicted}">0</span><span class="of">/ 900</span></div>
        <p class="read-cap"><b>${r.pointsToPass} points</b> to the pass mark. Hold your pace and you cross it.</p>
        <div class="read-bar-wrap">
          <div class="read-bar">
            <i data-w="${r.barPct.toFixed(1)}"></i>
            <span class="read-tick" style="left:${r.passTickPct.toFixed(1)}%"></span>
          </div>
        </div>
        <div class="read-fore">
          <span>Forecast on this pace <span class="fv fg">${r.forecast}</span></span>
          <span><span class="fv">${r.daysToExam}</span> days to exam</span>
        </div>
      </div>
      <div class="read-stats">
        <div class="rstat"><span class="n mono" data-cnt="${s.sessions}">0</span><span class="l">Sessions</span>${sparkSvg('sessions')}</div>
        <div class="rstat"><span class="n mono" data-cnt="${s.questions}">0</span><span class="l">Questions</span>${sparkSvg('questions')}</div>
        <div class="rstat"><span class="n mono" data-cnt="${s.accuracy}" data-suffix="%">0</span><span class="l">Accuracy</span>${sparkSvg('accuracy')}</div>
        <div class="rstat"><span class="n mono" data-cnt="${s.studyDays}">0</span><span class="l">Study days</span>${sparkSvg('studyDays')}</div>
      </div>`;
    return el;
  }

  /* ============================================================
     CONSTELLATION tile: golden-angle spiral, twinkle, pulsar, tooltip
     ============================================================ */
  function constellationTile(){
    const el=document.createElement('div');
    el.className='tile s-const';
    el.innerHTML=`
      <div>
        <div class="tile-eyebrow" style="margin-bottom:8px">Knowledge constellation <span class="count">50 topics · 5 domains</span></div>
        <h2>Your sky tonight</h2>
        <p class="const-sub">Each star is a topic. Bigger means more practiced, brighter means closer to mastered. Color marks the domain.</p>
      </div>
      <div class="const-mount" id="constMount"></div>
      <div class="const-legend">
        <span><i></i>Mastered</span><span><i class="t2"></i>Proficient</span>
        <span><i class="t3"></i>Developing</span><span><i class="t4"></i>Untouched</span>
      </div>`;
    return el;
  }

  function renderConstellation(mount){
    const W=1000, H=440;
    const DOMAINS=[
      {idx:1,cx:W*0.16,cy:H*0.40,kicker:'DOMAIN 1',name:'Networking Concepts'},
      {idx:2,cx:W*0.40,cy:H*0.72,kicker:'DOMAIN 2',name:'Network Implementation'},
      {idx:3,cx:W*0.56,cy:H*0.26,kicker:'DOMAIN 3',name:'Network Operations'},
      {idx:4,cx:W*0.78,cy:H*0.66,kicker:'DOMAIN 4',name:'Network Security'},
      {idx:5,cx:W*0.92,cy:H*0.32,kicker:'DOMAIN 5',name:'Network Troubleshooting'},
    ];
    const clusters={}; DOMAINS.forEach(c=>clusters[c.idx]=c);
    const svg=svgEl('svg',{viewBox:`0 0 ${W} ${H}`,role:'img','aria-label':'Knowledge constellation: 50 topics clustered by exam domain'});

    const grid=svgEl('g',{class:'const-grid'});
    for(let x=0;x<=W;x+=100) grid.appendChild(svgEl('line',{x1:x,y1:0,x2:x,y2:H}));
    for(let y=0;y<=H;y+=80) grid.appendChild(svgEl('line',{x1:0,y1:y,x2:W,y2:y}));
    svg.appendChild(grid);

    const tetherLayer=svgEl('g',{}), nodeLayer=svgEl('g',{}), labelLayer=svgEl('g',{});
    svg.appendChild(tetherLayer); svg.appendChild(nodeLayer); svg.appendChild(labelLayer);

    DOMAINS.forEach(c=>{
      const g=svgEl('g',{class:'const-cluster-label'});
      const k=svgEl('text',{x:c.cx,y:c.cy-104,'text-anchor':'middle',class:'kicker'}); k.textContent=c.kicker;
      const n=svgEl('text',{x:c.cx,y:c.cy-90,'text-anchor':'middle',class:'name'}); n.textContent=c.name;
      g.appendChild(k); g.appendChild(n); labelLayer.appendChild(g);
    });

    const byDomain={};
    D.topics.forEach(t=>{ (byDomain[t.domainIdx]=byDomain[t.domainIdx]||[]).push(t); });

    const tierOpacity={novice:.34,developing:.58,proficient:.82,mastered:1,unstudied:.18};
    const nodes=[];
    let igCount=0; // global ignite-order counter for a sweep across the whole sky
    Object.entries(byDomain).forEach(([dom,topics])=>{
      const c=clusters[dom];
      topics.forEach((t,i)=>{
        const angle=(i*2.399)+(c.idx*0.7);
        const baseDist=42+(i%4)*20;
        const cx=c.cx+Math.cos(angle)*baseDist;
        const cy=c.cy+Math.sin(angle)*baseDist;
        const r=t.attempts>0?Math.min(22,6+Math.sqrt(t.attempts)*2.2):5;
        const innerR=Math.max(2,r*((t.mastery||0)/100)+2);
        const g=svgEl('g',{class:'const-node','data-domain':c.idx,'data-tier':t.tier,tabindex:0,
          'aria-label':`${t.topic}, ${t.domainId}: ${t.mastery}% mastery, ${t.attempts} attempt${t.attempts===1?'':'s'}`});
        const halo=svgEl('circle',{cx,cy,r,class:'const-halo'});
        const core=svgEl('circle',{cx,cy,r:innerR,class:'const-core'});
        const base=tierOpacity[t.tier]||.3;
        if(!reduce && t.tier!=='unstudied'){
          core.classList.add('twinkle');
          core.style.setProperty('--base',base);
          core.style.setProperty('--tw',(3.4+(i%5)*0.5)+'s');
          core.style.setProperty('--td',((i*0.37)%3).toFixed(2)+'s');
        }
        g.appendChild(halo); g.appendChild(core);
        // ignite stagger: tighten so all 50 stars light within ~600ms — one cohesive sweep, not 50 reveals
        g.style.setProperty('--ig', (igCount++ * 11) + 'ms');
        const tether=svgEl('line',{x1:c.cx,y1:c.cy,x2:cx,y2:cy,class:'const-tether'});
        tetherLayer.appendChild(tether);
        nodeLayer.appendChild(g);
        nodes.push({gEl:g,haloEl:halo,coreEl:core,cx,cy,r,mastery:t.mastery,attempts:t.attempts,topic:t.topic});
      });
    });

    // pulsar: brightest mastered star
    if(!reduce){
      let best=null;
      nodes.forEach(n=>{ if(n.mastery>=80 && (!best||n.mastery>best.mastery)) best=n; });
      if(best){ best.gEl.classList.add('const-pulsar'); best.haloEl.style.setProperty('--r0',best.r+'px'); }
    }

    mount.appendChild(svg);

    // tooltip
    const tt=document.createElement('div'); tt.className='const-tt'; mount.appendChild(tt);
    function showTip(n){
      tt.innerHTML=`<b>${esc(n.topic)}</b><span class="tt-meta">${n.mastery}% mastery · ${n.attempts} attempt${n.attempts===1?'':'s'}</span>`;
      const rect=mount.getBoundingClientRect();
      const sx=(n.cx/W)*rect.width, sy=(n.cy/H)*rect.height;
      tt.style.left=Math.min(rect.width-160,Math.max(6,sx+12))+'px';
      tt.style.top=Math.max(4,sy-48)+'px';
      tt.classList.add('show');
    }
    function hideTip(){ tt.classList.remove('show'); }
    nodes.forEach(n=>{
      n.gEl.addEventListener('pointerenter',()=>showTip(n));
      n.gEl.addEventListener('pointerleave',hideTip);
      n.gEl.addEventListener('focus',()=>showTip(n));
      n.gEl.addEventListener('blur',hideTip);
    });
  }

  /* ============================================================
     PASS-TREND tile
     ============================================================ */
  function trendTile(){
    const el=document.createElement('div');
    el.className='tile s-trend';
    el.innerHTML=`
      <div class="trend-head">
        <div class="trend-title">
          <div class="tile-eyebrow" style="margin-bottom:6px">Accuracy over time</div>
          <h2>Trending <em>toward pass</em></h2>
          <p class="trend-verdict">At <b>74%</b> now, above the 72% line and climbing six weeks straight.</p>
        </div>
        <div class="acc-tabs" role="group" aria-label="Time range">
          <button class="acc-tab" data-range="week" aria-pressed="false">Week</button>
          <button class="acc-tab" data-range="month" aria-pressed="true">Month</button>
          <button class="acc-tab" data-range="all" aria-pressed="false">All</button>
        </div>
      </div>
      <div class="acc-wrap" id="accWrap"></div>`;
    return el;
  }

  function renderTrend(wrap){
    const W=960, H=240, PAD=46;
    const innerW=W-2*PAD, innerH=H-2*PAD;
    const yMin=D.passTrend.yMin, yMax=D.passTrend.yMax, passAcc=D.passTrend.passAcc;
    const yOf=acc=>PAD+(1-(acc-yMin)/(yMax-yMin))*innerH;
    const xOf=(i,n)=>PAD+(n>1?(i/(n-1))*innerW:innerW/2);
    const passY=yOf(passAcc);

    const svg=svgEl('svg',{class:'acc-svg',viewBox:`0 0 ${W} ${H}`});

    const grid=svgEl('g',{class:'acc-grid'});
    [60,70,80,90].forEach(pct=>{
      const y=yOf(pct);
      grid.appendChild(svgEl('line',{x1:PAD,y1:y,x2:W-PAD,y2:y}));
      const t=svgEl('text',{x:PAD-10,y:y+3,'text-anchor':'end'}); t.textContent=pct+'%';
      grid.appendChild(t);
    });
    svg.appendChild(grid);

    const passG=svgEl('g',{});
    passG.appendChild(svgEl('line',{class:'acc-pass-line',x1:PAD,y1:passY,x2:W-PAD,y2:passY}));
    const pt=svgEl('text',{class:'acc-pass-label',x:W-PAD+6,y:passY+4}); pt.textContent='PASS';
    passG.appendChild(pt);
    svg.appendChild(passG);

    const dataLayer=svgEl('g',{}); svg.appendChild(dataLayer);
    const labelLayer=svgEl('g',{}); svg.appendChild(labelLayer);
    wrap.appendChild(svg);

    function ptsFor(key){
      const arr=D.passTrend.data[key];
      return arr.map((d,i)=>({x:xOf(i,arr.length),y:yOf(d.acc),acc:d.acc,label:d.label}));
    }
    function buildLine(pts){ return pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' '); }
    function buildArea(pts){
      if(!pts.length) return '';
      const base=(H-PAD).toFixed(1);
      return 'M'+pts[0].x.toFixed(1)+' '+base+' '+pts.map(p=>'L'+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ')+
        ' L'+pts[pts.length-1].x.toFixed(1)+' '+base+' Z';
    }

    function draw(key,animate){
      dataLayer.innerHTML=''; labelLayer.innerHTML='';
      const pts=ptsFor(key);
      const area=svgEl('path',{class:'acc-area',d:buildArea(pts)});
      const line=svgEl('path',{class:'acc-line',d:buildLine(pts)});
      dataLayer.appendChild(area); dataLayer.appendChild(line);
      const dots=pts.map(p=>{
        const c=svgEl('circle',{class:'acc-dot',cx:p.x.toFixed(1),cy:p.y.toFixed(1),r:4});
        dataLayer.appendChild(c); return c;
      });
      pts.forEach(p=>{ if(p.label){ const t=svgEl('text',{class:'acc-xlabel',x:p.x.toFixed(1),y:H-PAD+18,'text-anchor':'middle'}); t.textContent=p.label; labelLayer.appendChild(t); }});

      if(animate && !reduce){
        const len=line.getTotalLength();
        line.style.setProperty('--len',len);
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          line.classList.add('drawn'); area.classList.add('drawn');
          // dots pop AFTER the line has drawn in, staggered left-to-right for a tactile finish
          dots.forEach((d,i)=>{ d.style.transitionDelay=(0.62 + i*0.045)+'s'; d.classList.add('drawn'); });
        }));
      } else {
        area.style.opacity='.1'; dots.forEach(d=>{ d.style.opacity='1'; d.style.transform='scale(1)'; });
      }
    }
    // expose so the IntersectionObserver can fire the first draw exactly when the tile lands
    wrap._drawTrend = (animate)=>draw('month', animate);
    if(reduce){ draw('month', false); }

    const tabs=wrap.closest('.tile').querySelectorAll('.acc-tab');
    tabs.forEach(b=>b.addEventListener('click',()=>{
      tabs.forEach(x=>x.setAttribute('aria-pressed', x===b?'true':'false'));
      draw(b.dataset.range, true);
    }));
  }

  /* ============================================================
     WHY-SCORE tile
     ============================================================ */
  function whyTile(){
    const w=D.whyScore;
    const el=document.createElement('div');
    el.className='tile s-why';
    const factors=w.factors.map(f=>`
      <div class="why-f">
        <span class="ar ${f.effect}">${f.effect==='up'?'▲':'▼'}</span>
        <span><span class="ft">${esc(f.label)}</span><span class="fn">${esc(f.note)}</span></span>
      </div>`).join('');
    el.innerHTML=`
      <div>
        <div class="tile-eyebrow">Highest-leverage move</div>
        <div class="why-lev"><span class="v">${esc(w.leverage)}</span><span class="l">on your readiness score</span></div>
        <div class="why-head">${esc(w.headline)}</div>
        <p class="why-body">${esc(w.body)}</p>
      </div>
      <div class="why-factors">${factors}</div>`;
    return el;
  }

  /* ============================================================
     DOMAINS tile
     ============================================================ */
  function domainsTile(){
    const el=document.createElement('div');
    el.className='tile s-domains';
    const rows=D.domains.slice().sort((a,b)=>a.accuracy-b.accuracy).map(d=>{
      const weak=d.accuracy<60;
      return `<div class="dom-row">
        <div class="dl"><span class="obj mono">${d.num}</span><span class="txt">${esc(d.name)}</span></div>
        <div class="dm mono">${d.accuracy}%</div>
        <div class="dom-bar"><i data-d="${d.idx}" data-w="${d.accuracy}"></i></div>
        <div class="dom-meta">${d.questions} questions · ${d.weight}% of exam${weak?' · <span class="flag">weakest, drill here</span>':''}</div>
      </div>`;
    }).join('');
    el.innerHTML=`<div class="tile-eyebrow">Mastery by domain <span class="count">5 domains · worst first</span></div><div class="dom-list">${rows}</div>`;
    return el;
  }

  /* ============================================================
     STREAK tile
     ============================================================ */
  function streakTile(){
    const s=D.streak;
    const el=document.createElement('div');
    el.className='tile s-streak';
    const dots=s.week.map(d=>`
      <div class="wd ${d.studied?'on':''} ${d.isToday?'today':''}">
        <span class="dot"></span><span class="wl">${d.dayLabel}</span>
      </div>`).join('');
    el.innerHTML=`
      <div class="tile-eyebrow" style="margin-bottom:8px">Study streak</div>
      <div class="streak-main"><span class="v mono" data-cnt="${s.current}">0</span><span class="l">day streak</span></div>
      <div class="streak-sub">Longest ${s.longest} · ${s.totalActiveDays} active days · last studied ${esc(s.lastStudy.toLowerCase())}</div>
      <div class="week-dots">${dots}</div>`;
    return el;
  }

  /* ============================================================
     DIFFICULTY tile
     ============================================================ */
  function diffTile(){
    const el=document.createElement('div');
    el.className='tile s-diff';
    const cls={Easy:'e',Medium:'m',Hard:'h'};
    const rows=D.difficulty.map(d=>`
      <div class="diff-row">
        <div class="diff-top"><span class="dk">${esc(d.label)}</span>
          <span><span class="dv">${d.accuracy}%</span> <span class="dc">${d.count}q</span></span></div>
        <div class="diff-bar"><i class="${cls[d.label]}" data-w="${d.accuracy}"></i></div>
      </div>`).join('');
    el.innerHTML=`<div class="tile-eyebrow">By difficulty</div><div class="diff-list">${rows}</div>`;
    return el;
  }

  /* ============================================================
     EXAM VS QUIZ tile
     ============================================================ */
  function evqTile(){
    const e=D.examVsQuiz;
    const el=document.createElement('div');
    el.className='tile s-evq';
    el.innerHTML=`
      <div class="tile-eyebrow">Practice vs timed</div>
      <div class="evq-nums">
        <div class="evq-cell"><div class="n mono">${e.quizAvg}%</div><div class="t">Quiz avg</div><div class="s">${e.quizSessions} sessions</div></div>
        <div class="evq-cell"><div class="n mono lo">${e.examAvg}%</div><div class="t">Exam avg</div><div class="s">${e.examSessions} sessions</div></div>
      </div>
      <p class="evq-note">${esc(e.insight)}</p>`;
    return el;
  }

  /* ============================================================
     HEATMAP tile
     ============================================================ */
  function heatTile(){
    const el=document.createElement('div');
    el.className='tile s-heat';
    // last 26 weeks (182 days) for a wide-short strip
    const days=D.heatmap.slice(-182);
    const lvl=c=>c===0?'':c<4?'l1':c<10?'l2':c<20?'l3':'l4';
    const cells=days.map(d=>`<span class="heat-cell ${lvl(d.count)}"></span>`).join('');
    const active=D.streak.totalActiveDays;
    el.innerHTML=`
      <div class="tile-eyebrow">Activity <span class="count">last 26 weeks · ${active} active days total</span></div>
      <div class="heat-wrap"><div class="heat-grid">${cells}</div></div>
      <div class="heat-foot">
        <span>Each cell is one day</span>
        <span class="heat-scale">Less <i class="heat-cell"></i><i class="heat-cell l1"></i><i class="heat-cell l2"></i><i class="heat-cell l3"></i><i class="heat-cell l4"></i> More</span>
      </div>`;
    return el;
  }

  /* ============================================================
     WRONG PATTERNS tile
     ============================================================ */
  function wrongTile(){
    const el=document.createElement('div');
    el.className='tile s-wrong';
    const rows=D.wrongPatterns.map((p,i)=>`
      <div class="wrong-row">
        <div class="wrong-rank mono">${i+1}</div>
        <div class="wrong-mid"><div class="n">${esc(p.label)}</div><div class="d">${esc(p.domain)} · ${esc(p.note)}</div></div>
        <div class="wrong-cnt"><b>${p.count}</b>missed</div>
      </div>`).join('');
    el.innerHTML=`<div class="tile-eyebrow">Where you slip most <span class="count">top 4 patterns</span></div><div class="wrong-list">${rows}</div>`;
    return el;
  }

  /* ============================================================
     MILESTONES tile
     ============================================================ */
  function milesTile(){
    const m=D.milestones;
    const el=document.createElement('div');
    el.className='tile s-miles';
    const recent=m.recent.slice(0,3).map(r=>`
      <div class="mile-row">
        <div class="mile-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${r.icon}"/></svg></div>
        <div class="mile-txt"><div class="n">${esc(r.label)}</div><div class="d">${esc(r.earned)}</div></div>
      </div>`).join('');
    const next=m.locked[0];
    const lockRow=`
      <div class="mile-row">
        <div class="mile-ic lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></div>
        <div class="mile-txt"><div class="n">${esc(next.label)}</div><div class="lk mono">${next.progress[0]} / ${next.progress[1]} · ${esc(next.desc)}</div></div>
      </div>`;
    el.innerHTML=`
      <div class="tile-eyebrow">Milestones <span class="mile-count">${m.unlocked} / ${m.total}</span></div>
      <div class="mile-prog"><i data-w="${(m.unlocked/m.total*100).toFixed(0)}"></i></div>
      <div class="mile-list">${recent}${lockRow}</div>`;
    return el;
  }

  /* ============================================================
     EXAM HISTORY tile
     ============================================================ */
  function examTile(){
    const el=document.createElement('div');
    el.className='tile s-exam';
    const rows=D.examHistory.map(e=>{
      const pass=e.score>=720;
      return `<div class="exam-row">
        <div><div class="el">${esc(e.label)}</div><div class="ed mono">${esc(e.date)} · ${e.questions}q</div></div>
        <div class="es ${pass?'pass':''} mono">${e.score}</div>
        <div class="exam-bar"><i class="${pass?'pass':''}" data-w="${(e.pct).toFixed(0)}"></i></div>
      </div>`;
    }).join('');
    el.innerHTML=`<div class="tile-eyebrow">Full exams <span class="count">last 5</span></div><div class="exam-list">${rows}</div>`;
    return el;
  }

  /* ---------- assemble ---------- */
  const builders=[
    readinessTile, constellationTile, trendTile, whyTile, domainsTile,
    streakTile, diffTile, evqTile, heatTile, wrongTile, milesTile, examTile,
  ];
  const tiles=builders.map(fn=>fn());
  tiles.forEach((t,i)=>{ t.style.setProperty('--index', i); bento.appendChild(t); });

  // render the two interactive keepers into their mounts
  renderConstellation(document.getElementById('constMount'));
  renderTrend(document.getElementById('accWrap'));

  /* ---------- entrance (IntersectionObserver, stagger via --index) ---------- */
  function runFills(t){
    // count-ups + bar fills fire as THIS tile lands. Delay slightly so they ride the settle,
    // and offset by the tile's own stagger index so the whole board choreographs as one moment.
    const idx = +(t.style.getPropertyValue('--index')||0);
    // ride the tile's own settle (~120ms in), but cap the index offset so tiles scrolled to
    // individually (below the fold) still fire promptly instead of stacking a long delay.
    const lead = reduce ? 0 : 120 + Math.min(idx,6)*52;
    const fire = ()=>{
      t.querySelectorAll('[data-cnt]').forEach(n=>countUp(n, +n.dataset.cnt, n.dataset.suffix||''));
      t.querySelectorAll('[data-w]').forEach(i=>{ i.style.width = i.dataset.w + '%'; });
      // constellation: ignite the stars in sync with the tile settling
      if(t.classList.contains('s-const')) t.classList.add('lit');
      // pass-trend: draw the line+area in (then dots pop) as the tile lands
      if(t.classList.contains('s-trend')){
        const w=t.querySelector('#accWrap');
        if(w && w._drawTrend) w._drawTrend(true);
      }
    };
    if(lead) setTimeout(fire, lead); else fire();
  }
  if(reduce || !('IntersectionObserver' in window)){
    tiles.forEach(t=>{ t.classList.add('in'); runFills(t); });
  } else {
    const io=new IntersectionObserver((entries,obs)=>{
      entries.forEach(en=>{
        if(en.isIntersecting){
          en.target.classList.add('in');
          runFills(en.target);
          obs.unobserve(en.target);
        }
      });
    },{threshold:0.12});
    tiles.forEach(t=>io.observe(t));
  }

  /* ---------- header count-ups ---------- */
  countUp(document.getElementById('hScore'), D.readiness.predicted);
  countUp(document.getElementById('hGap'), D.readiness.pointsToPass);

  /* ---------- theme toggle ---------- */
  document.getElementById('themeBtn').addEventListener('click',()=>{
    const html=document.documentElement;
    html.dataset.theme = html.dataset.theme==='dark'?'light':'dark';
  });
})();
</script>
</body>
</html>
