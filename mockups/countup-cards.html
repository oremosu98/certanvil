<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CertAnvil · Stat count-up motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:oklch(0.975 0.007 85); --surface:oklch(0.992 0.004 85); --surface-2:oklch(0.965 0.010 84);
    --ink:oklch(0.22 0.015 280); --ink-soft:oklch(0.36 0.014 280); --muted:oklch(0.50 0.013 280);
    --border:oklch(0.86 0.008 85); --border-soft:oklch(0.91 0.006 85);
    --accent:oklch(0.50 0.155 55); --accent-deep:oklch(0.42 0.150 52); --on-accent:oklch(0.985 0.010 85);
    --ease-out:cubic-bezier(0.23,1,0.32,1);
  }
  [data-theme="dark"]{
    --bg:oklch(0.16 0.009 275); --surface:oklch(0.205 0.009 275); --surface-2:oklch(0.185 0.009 275);
    --ink:oklch(0.96 0.006 275); --ink-soft:oklch(0.78 0.010 275); --muted:oklch(0.60 0.013 275);
    --border:oklch(0.30 0.008 275); --border-soft:oklch(0.26 0.008 275);
    --accent:oklch(0.80 0.155 64); --accent-deep:oklch(0.70 0.150 62); --on-accent:oklch(0.18 0.020 275);
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:clamp(30px,6vw,72px)}
  .wrap{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:34px}
  .toolbar{display:flex;gap:14px;align-items:center;margin-bottom:6px}
  .replay{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--border);border-radius:999px;padding:8px 14px;cursor:pointer;transition:color 180ms var(--ease-out),border-color 180ms var(--ease-out),transform 140ms var(--ease-out)}
  @media (hover:hover){.replay:hover{color:var(--accent);border-color:color-mix(in oklab,var(--accent) 40%,var(--border))}}
  .replay:active{transform:scale(0.96)}
  .num{font-variant-numeric:tabular-nums}

  /* ── Card 1 · resume ── */
  .resume{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:1px solid var(--border);border-radius:18px;padding:clamp(20px,3vw,28px);box-shadow:0 1px 0 rgba(255,255,255,.04),0 20px 44px -26px rgba(0,0,0,.22)}
  .resume-eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--accent)}
  .resume-stats{display:grid;grid-template-columns:repeat(3,1fr);margin:18px 0 22px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .resume-stat{padding:14px 18px;border-right:1px solid var(--border)}
  .resume-stat:last-child{border-right:0}
  .resume-stat .v{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:30px;line-height:1;color:var(--ink);letter-spacing:-.01em}
  .resume-stat .l{margin-top:8px;font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .resume-topic{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:23px;letter-spacing:-.01em;color:var(--ink)}
  .resume-sub{margin-top:9px;font-size:14px;line-height:1.55;color:var(--ink-soft)}
  .resume-sub b{color:var(--ink);font-weight:650}
  .resume-cta{margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:none;border:1px solid color-mix(in oklab,var(--accent) 45%,var(--border));border-radius:12px;padding:15px 20px;cursor:pointer;color:var(--accent);font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:17px;transition:background 180ms var(--ease-out),transform 140ms var(--ease-out)}
  @media (hover:hover){.resume-cta:hover{background:color-mix(in oklab,var(--accent) 7%,transparent)}}
  .resume-cta:active{transform:scale(0.99)}
  .resume-cta svg{width:18px;height:18px}

  /* ── Card 2 · today / streak ── */
  .mini{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;max-width:480px}
  .mini-col{padding:20px 24px;border-right:1px solid var(--border)}
  .mini-col:last-child{border-right:0}
  .mini-lbl{font-size:11.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
  .mini-v{margin-top:14px;font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:30px;line-height:1;color:var(--ink);letter-spacing:-.01em}
  .mini-v .unit{font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--muted);margin-left:5px}
  .mini-sub{margin-top:10px;font-size:13px;color:var(--muted)}

  .theme-toggle{position:fixed;top:18px;right:18px;width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:16px;cursor:pointer;display:grid;place-items:center}
  .theme-toggle:active{transform:scale(0.94)}
  .caption{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☾</button>
  <div class="caption">Stat count-up · numbers roll 0 → value on load</div>
  <div class="wrap">
    <div class="toolbar"><button class="replay" id="replay">↻ <span>Replay count-up</span></button></div>

    <!-- Card 1 -->
    <div class="resume">
      <span class="resume-eyebrow">→ Pick up where you left off</span>
      <div class="resume-stats">
        <div class="resume-stat"><div class="v num" data-to="1">0</div><div class="l">Day streak</div></div>
        <div class="resume-stat"><div class="v num" data-to="0">0</div><div class="l">Done today</div></div>
        <div class="resume-stat"><div class="v num" data-to="10">0</div><div class="l">Questions</div></div>
      </div>
      <div class="resume-topic">Cable Issues</div>
      <div class="resume-sub">Last session <b>0 / 1</b> · 17 days ago · 5 still in your wrong bank.</div>
      <button class="resume-cta">Drill the 5 you missed
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>

    <!-- Card 2 -->
    <div class="mini">
      <div class="mini-col">
        <div class="mini-lbl">Today</div>
        <div class="mini-v"><span class="num" data-to="0">0</span><span class="unit">/ 20</span></div>
        <div class="mini-sub">daily goal · <span class="num" data-to="0">0</span>%</div>
      </div>
      <div class="mini-col">
        <div class="mini-lbl">Streak</div>
        <div class="mini-v"><span class="num" data-to="1">0</span><span class="unit">days</span></div>
        <div class="mini-sub">longest · <span class="num" data-to="4">0</span> days</div>
      </div>
    </div>
  </div>
<script>
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Emil: count-up is a one-time entrance reveal → ease-out (decelerates to settle),
  // short (~700-950ms), reduced-motion shows the final value instantly.
  function animateCount(el, to, dur){
    if (reduce || to <= 0){ el.textContent = to; return; }
    var start = null, from = 0;
    function frame(now){
      if (start === null) start = now;
      var t = Math.min(1, (now - start) / dur);
      var eased = 1 - Math.pow(1 - t, 3);            // ease-out cubic
      el.textContent = Math.round(from + (to - from) * eased);
      if (t < 1) requestAnimationFrame(frame);
      else el.textContent = to;
    }
    requestAnimationFrame(frame);
  }

  function run(){
    var nums = document.querySelectorAll('.num');
    nums.forEach(function(el, i){
      var to = parseInt(el.getAttribute('data-to'), 10) || 0;
      el.textContent = '0';
      // bigger numbers take a touch longer; tiny stagger so they don't all fire identically
      var dur = 600 + Math.min(to, 30) * 14;
      setTimeout(function(){ animateCount(el, to, dur); }, i * 60);
    });
  }
  run();
  document.getElementById('replay').addEventListener('click', run);

  (function(){var t=document.getElementById('theme-toggle');t.addEventListener('click',function(){var d=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',d?'light':'dark');t.textContent=d?'☾':'☀';});})();
</script>
</body>
</html>
